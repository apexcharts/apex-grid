<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Row Selection - ApexGrid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        align-items: center;
      }
      .toolbar button {
        padding: 6px 12px;
        font: inherit;
        font-size: 13px;
        border: 1px solid #d0d5dd;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #f7f9fc;
      }
      .selection-count {
        margin-left: auto;
        font-size: 13px;
        color: #1a1a2e;
        font-weight: 500;
      }
      apex-grid {
        min-height: 420px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Row Selection (Multi-Mode with Checkbox Column)</h2>
    <p class="subtitle">
      Multi-row selection with a leading checkbox column. <code>Space</code> toggles the focused row, <code>Shift+Space</code> extends the range, <code>Ctrl+A</code> selects all.
    </p>
    <div class="toolbar">
      <button id="select-all">Select all</button>
      <button id="clear">Clear</button>
      <span class="selection-count" id="count">0 selected</span>
    </div>
    <apex-grid id="grid"></apex-grid>
    <script type="module">
      const data = [
        { id: '1',  name: 'Wireless Headphones',  price: 129.99, sold: 82,  rating: 4.5 },
        { id: '2',  name: 'USB-C Hub',            price: 49.99,  sold: 35,  rating: 3.8 },
        { id: '3',  name: 'Mechanical Keyboard',  price: 189.00, sold: 64,  rating: 4.7 },
        { id: '4',  name: 'Ergonomic Mouse',      price: 79.95,  sold: 91,  rating: 4.2 },
        { id: '5',  name: 'Monitor Stand',        price: 59.99,  sold: 47,  rating: 3.5 },
        { id: '6',  name: '4K Webcam',            price: 149.00, sold: 28,  rating: 4.0 },
        { id: '7',  name: 'Laptop Sleeve',        price: 34.99,  sold: 110, rating: 4.3 },
        { id: '8',  name: 'Desk Lamp',            price: 44.50,  sold: 73,  rating: 3.9 },
        { id: '9',  name: 'Cable Organizer',      price: 19.99,  sold: 156, rating: 4.1 },
        { id: '10', name: 'Bluetooth Speaker',    price: 89.99,  sold: 58,  rating: 4.6 },
        { id: '11', name: 'Screen Protector',     price: 14.99,  sold: 203, rating: 3.2 },
        { id: '12', name: 'Power Bank',           price: 39.99,  sold: 88,  rating: 4.4 },
        { id: '13', name: 'USB Flash Drive',      price: 24.99,  sold: 134, rating: 3.7 },
        { id: '14', name: 'Wireless Charger',     price: 29.99,  sold: 97,  rating: 4.0 },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'name',   headerText: 'Name'   },
        { key: 'price',  headerText: 'Price',  type: 'number' },
        { key: 'rating', headerText: 'Rating', type: 'number' },
        { key: 'sold',   headerText: 'Sold',   type: 'number' },
      ];
      grid.data = data;
      grid.selection = {
        enabled: true,
        mode: 'multiple',
        showCheckboxColumn: true,
      };

      const count = document.getElementById('count');
      const updateCount = () => {
        count.textContent = `${grid.selectedRows?.length ?? 0} selected`;
      };

      grid.addEventListener('rowSelected', updateCount);
      document.getElementById('select-all').addEventListener('click', () => grid.selectAllRows());
      document.getElementById('clear').addEventListener('click', () => grid.clearSelection());
    </script>
  </body>
</html>
