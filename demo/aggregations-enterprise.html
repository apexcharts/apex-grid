<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Column Aggregations (Enterprise) - ApexGrid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid-enterprise.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .toolbar button {
        padding: 6px 12px;
        font: inherit;
        font-size: 13px;
        border: 1px solid #d0d5dd;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #f7f9fc;
      }
      .preview {
        margin-top: 12px;
        padding: 10px 14px;
        background: #f7f9fc;
        border-left: 3px solid #4f6ee0;
        font-size: 12px;
        font-family: monospace;
        color: #1a1a2e;
        white-space: pre;
        overflow-x: auto;
        max-height: 220px;
      }
      apex-grid-enterprise {
        min-height: 380px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid-enterprise');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Column Aggregations <span style="font-size:13px;font-weight:500;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:20px;padding:2px 10px;vertical-align:middle">Enterprise</span></h2>
    <p class="subtitle">
      An enterprise-only feature: request sum / avg / min / max / count per column via the <code>aggregations</code> property, then read the computed values with <code>getAggregations()</code>.
    </p>
    <div class="toolbar">
      <button id="compute">Compute aggregations</button>
    </div>
    <apex-grid-enterprise id="grid"></apex-grid-enterprise>
    <pre class="preview" id="preview">Click "Compute aggregations" to render getAggregations() output here.</pre>
    <script type="module">
      const data = [
        { id: '1', name: 'Wireless Headphones', price: 129.99, sold: 82, rating: 4.5 },
        { id: '2', name: 'USB-C Hub',           price: 49.99,  sold: 35, rating: 3.8 },
        { id: '3', name: 'Mechanical Keyboard', price: 189.0,  sold: 64, rating: 4.7 },
        { id: '4', name: 'Ergonomic Mouse',     price: 79.95,  sold: 91, rating: 4.2 },
        { id: '5', name: 'Monitor Stand',       price: 59.99,  sold: 47, rating: 3.5 },
        { id: '6', name: '4K Webcam',           price: 149.0,  sold: 28, rating: 4.0 },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'name',   headerText: 'Name' },
        { key: 'price',  headerText: 'Price',  type: 'number' },
        { key: 'rating', headerText: 'Rating', type: 'number' },
        { key: 'sold',   headerText: 'Sold',   type: 'number' },
      ];
      grid.data = data;

      // Per-column aggregation request (enterprise API).
      grid.aggregations = {
        price: ['sum', 'avg', 'min', 'max'],
        sold: ['sum', 'max'],
        rating: ['avg'],
      };

      const preview = document.getElementById('preview');
      document.getElementById('compute').addEventListener('click', () => {
        preview.textContent = JSON.stringify(grid.getAggregations(), null, 2);
      });
    </script>
  </body>
</html>
