<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel (XLSX) Export (Enterprise) - ApexGrid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid-enterprise.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .toolbar button {
        padding: 6px 12px;
        font: inherit;
        font-size: 13px;
        border: 1px solid #d0d5dd;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #f7f9fc;
      }
      apex-grid-enterprise {
        min-height: 380px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid-enterprise');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Excel (XLSX) Export <span style="font-size:13px;font-weight:500;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:20px;padding:2px 10px;vertical-align:middle">Enterprise</span></h2>
    <p class="subtitle">
      Excel export is an enterprise feature (CSV stays free in the community grid). Numbers, booleans, and dates keep their native Excel cell types. The toolbar's export menu also gains an "Export XLSX" entry.
    </p>
    <div class="toolbar">
      <button id="dl-view">Download view (data.xlsx)</button>
      <button id="dl-selected">Download selected (selected.xlsx)</button>
      <button id="dl-all">Download all (all.xlsx)</button>
    </div>
    <apex-grid-enterprise id="grid"></apex-grid-enterprise>
    <script type="module">
      const data = [
        { id: '1', name: 'Wireless Headphones', price: 129.99, sold: 82, rating: 4.5, added: new Date('2026-01-12') },
        { id: '2', name: 'USB-C Hub',           price: 49.99,  sold: 35, rating: 3.8, added: new Date('2026-02-03') },
        { id: '3', name: 'Mechanical Keyboard', price: 189.0,  sold: 64, rating: 4.7, added: new Date('2026-02-20') },
        { id: '4', name: 'Ergonomic Mouse',     price: 79.95,  sold: 91, rating: 4.2, added: new Date('2026-03-05') },
        { id: '5', name: 'Monitor Stand',       price: 59.99,  sold: 47, rating: 3.5, added: new Date('2026-03-18') },
        { id: '6', name: '4K Webcam',           price: 149.0,  sold: 28, rating: 4.0, added: new Date('2026-04-01') },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'name',   headerText: 'Name' },
        { key: 'price',  headerText: 'Price',  type: 'number' },
        { key: 'rating', headerText: 'Rating', type: 'number' },
        { key: 'sold',   headerText: 'Sold',   type: 'number' },
        { key: 'added',  headerText: 'Added',  type: 'date' },
      ];
      grid.data = data;
      grid.selection = { enabled: true, mode: 'multiple', showCheckboxColumn: true };

      document.getElementById('dl-view').addEventListener('click',     () => grid.exportToXLSX({ filename: 'data',     sheetName: 'Products' }));
      document.getElementById('dl-selected').addEventListener('click', () => grid.exportToXLSX({ filename: 'selected', sheetName: 'Products', source: 'selected' }));
      document.getElementById('dl-all').addEventListener('click',      () => grid.exportToXLSX({ filename: 'all',      sheetName: 'Products', source: 'all' }));
    </script>
  </body>
</html>
