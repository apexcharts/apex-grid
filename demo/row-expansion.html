<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Row Expansion (Master-Detail) - Real Estate Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      apex-grid {
        min-height: 480px;
        --ig-size: 2;
      }
      apex-grid::part(row) {
        grid-template-rows: minmax(2.125rem, auto) auto;
      }
      .detail {
        padding: 12px 16px;
        background: #f7f9fc;
        border-left: 3px solid #10b981;
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 8px 16px;
      }
      .detail-photos {
        display: flex;
        gap: 6px;
      }
      .detail-photo {
        width: 80px;
        height: 56px;
        border-radius: 4px;
        background-size: cover;
        background-position: center;
        box-shadow: 0 1px 2px rgba(0,0,0,0.12);
      }
      .detail-label {
        color: #666;
        font-weight: 500;
        font-size: 12px;
      }
      .detail-value {
        color: #1a1a2e;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Row Expansion — Real Estate Listings</h2>
    <p class="subtitle">
      A chevron column reveals an arbitrary detail panel under each row. The detail template is free-form HTML — unlike tree data, it doesn't share the grid's column layout.
    </p>
    <apex-grid id="grid"></apex-grid>
    <script type="module">
      import { html } from 'https://esm.sh/lit@3/html.js';

      // Photo gradients stand in for property images (no external deps).
      // Styles must be inline — apex-grid renders expansion templates in the
      // shadow DOM where light-DOM class selectors don't apply.
      const PHOTO_STYLE = 'display:inline-block;width:80px;height:56px;border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,0.12)';
      const photos = (g1, g2, g3) => html`
        <div style="display:flex;gap:6px">
          <span style="${PHOTO_STYLE};background:linear-gradient(135deg, ${g1}, ${g2})"></span>
          <span style="${PHOTO_STYLE};background:linear-gradient(135deg, ${g2}, ${g3})"></span>
          <span style="${PHOTO_STYLE};background:linear-gradient(135deg, ${g3}, ${g1})"></span>
        </div>
      `;

      const usd = (n) => `$${n.toLocaleString('en-US')}`;

      const data = [
        { id: 'LIS-2101', address: '142 Birch Lane, Brooklyn NY',     beds: 3, baths: 2,   sqft: 1820, price: 1295000, agent: 'Mira Patel',
          listed: '2026-04-22', notes: 'Renovated kitchen, south-facing terrace, walk-up brownstone.',
          g1: '#fb923c', g2: '#dc2626', g3: '#7c2d12' },
        { id: 'LIS-2102', address: '88 Marina Way, San Francisco CA', beds: 2, baths: 2,   sqft: 1140, price: 1480000, agent: 'Diego Rojas',
          listed: '2026-04-25', notes: 'Bay views, deeded parking, full building amenities.',
          g1: '#06b6d4', g2: '#0c4a6e', g3: '#1e3a8a' },
        { id: 'LIS-2103', address: '4421 Magnolia Dr, Austin TX',      beds: 4, baths: 3,   sqft: 2640, price:  865000, agent: 'Priya Iyer',
          listed: '2026-04-27', notes: 'Single-story ranch with pool, mature oaks, 0.4 acre lot.',
          g1: '#84cc16', g2: '#16a34a', g3: '#365314' },
        { id: 'LIS-2104', address: '720 Loma Vista, Denver CO',        beds: 3, baths: 2.5, sqft: 1980, price:  725000, agent: 'Otis Brown',
          listed: '2026-04-29', notes: 'Mountain views, finished basement, two-car garage.',
          g1: '#a855f7', g2: '#6366f1', g3: '#1e1b4b' },
        { id: 'LIS-2105', address: '15 Tide Pool Ct, Portland ME',     beds: 5, baths: 4,   sqft: 3210, price: 1145000, agent: 'Ana Costa',
          listed: '2026-05-01', notes: 'Coastal cedar shingle, dock rights, finished attic with skyline view.',
          g1: '#0ea5e9', g2: '#1e40af', g3: '#0c4a6e' },
        { id: 'LIS-2106', address: '3309 Pine Ridge, Seattle WA',      beds: 2, baths: 1,   sqft:  980, price:  615000, agent: 'Sven Eriksen',
          listed: '2026-05-03', notes: 'Craftsman bungalow in walkable Wallingford.',
          g1: '#475569', g2: '#1e293b', g3: '#0f172a' },
        { id: 'LIS-2107', address: '901 Sunset Ave, Miami FL',         beds: 4, baths: 3,   sqft: 2410, price: 1850000, agent: 'Yuki Tanaka',
          listed: '2026-05-04', notes: 'Waterfront condo, private elevator entry, two balconies.',
          g1: '#f472b6', g2: '#9333ea', g3: '#0f172a' },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'id',      headerText: 'Listing #'   },
        { key: 'address', headerText: 'Address'     },
        { key: 'beds',    headerText: 'Beds',       type: 'number' },
        { key: 'baths',   headerText: 'Baths',      type: 'number' },
        { key: 'sqft',    headerText: 'Sq Ft',      type: 'number' },
        { key: 'price',   headerText: 'Price',      type: 'number', cellTemplate: ({ value }) => usd(value) },
      ];
      grid.data = data;
      const LABEL_STYLE = 'color:#666;font-weight:500;font-size:12px';
      const VALUE_STYLE = 'color:#1a1a2e;font-size:13px;line-height:1.5';
      const PANEL_STYLE = 'padding:12px 16px;background:#f7f9fc;border-left:3px solid #10b981;display:grid;grid-template-columns:140px 1fr;gap:8px 16px;align-items:center';
      grid.expansion = {
        enabled: true,
        detailTemplate: ({ data }) => html`
          <div style="${PANEL_STYLE}">
            <span style="${LABEL_STYLE}">Photos</span>
            <span style="${VALUE_STYLE}">${photos(data.g1, data.g2, data.g3)}</span>
            <span style="${LABEL_STYLE}">Listed by</span>
            <span style="${VALUE_STYLE}">${data.agent} · ${data.listed}</span>
            <span style="${LABEL_STYLE}">Notes</span>
            <span style="${VALUE_STYLE}">${data.notes}</span>
          </div>
        `,
      };

      // Apex Grid 2.0 flips the header chevron when ANY row is expanded.
      // Override so it only shows expanded when ALL rows are expanded.
      await customElements.whenDefined('apex-grid');
      const syncHeaderChevron = () => {
        const root = grid.shadowRoot;
        if (!root) return;
        const toggle  = root.querySelector('[part="expansion-header"] [part="expansion-toggle"]');
        const chevron = root.querySelector('[part="expansion-header"] [part="expansion-chevron"]');
        if (!toggle || !chevron) return;
        const total = grid.data?.length ?? 0;
        const allExpanded = total > 0 && grid.expandedRows().length === total;
        chevron.style.transform = allExpanded ? 'rotate(90deg)' : 'rotate(0deg)';
        toggle.setAttribute('aria-expanded', allExpanded ? 'true' : 'false');
        toggle.setAttribute('aria-label', allExpanded ? 'Collapse all rows' : 'Expand all rows');
      };
      grid.addEventListener('rowExpanded', () => requestAnimationFrame(syncHeaderChevron));
      requestAnimationFrame(syncHeaderChevron);
    </script>
  </body>
</html>
