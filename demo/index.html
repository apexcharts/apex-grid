<!doctype html>
<html lang="en">
  <head>
    <title>apex-grid demos</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <meta charset="utf-8" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap');
      html,
      body {
        height: 100%;
      }

      body {
        --ig-size: 1;
        --sample-body-padding: 20px;
        background: hsla(var(--ig-surface-100));
        margin: 0;
        padding: var(--sample-body-padding);
        overflow: hidden;
      }

      apex-grid {
        flex: 1;
      }

      /* The shell wraps the theme picker, the page nav, and the active
         page's blurb. It sits above the demo content and stays mounted
         across hash-driven navigation. */
      #demo-shell {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .demo-shell-header {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.25rem 0;
        flex-wrap: wrap;
      }

      .theme-picker {
        --ig-size: 1;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      /* Tab-style nav along the top. Active page is underlined with the
         current primary colour so it tracks the loaded theme. */
      .demo-nav {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        flex: 1;
        flex-wrap: wrap;
      }

      .demo-nav a {
        color: inherit;
        text-decoration: none;
        font-size: 14px;
        padding: 6px 12px;
        border-radius: 4px;
        line-height: 1;
        transition: background-color 0.15s ease, color 0.15s ease;
      }

      .demo-nav a:hover {
        background: hsl(from currentcolor h s l / 8%);
      }

      .demo-nav a.is-active {
        background: hsl(from hsl(var(--ig-primary-500)) h s l / 14%);
        color: hsl(var(--ig-primary-500));
        font-weight: 500;
      }

      .demo-description {
        margin: 0;
        opacity: 0.65;
        font-size: 13px;
      }

      #demo {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        flex: 1;
        min-height: 0;
      }

      .demo-root {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        height: calc(100% - (var(--sample-body-padding) * 2));
      }
    </style>
  </head>
  <body class="ig-typography">
    <div class="demo-root">
      <div id="demo-shell"></div>
      <div id="demo"></div>
    </div>
    <script
      type="module"
      src="./demo.ts"
    ></script>
  </body>
</html>
