<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Grid - User Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      apex-grid {
        min-height: 400px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      // Auto-apply Bootstrap Light theme
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic, grid works without it */ }
    </script>
  </head>
  <body>
    <h2>User Directory</h2>
    <p class="subtitle">
      A simple grid with sorting, filtering, and resizable columns displaying user data
    </p>
    <apex-grid id="grid"></apex-grid>
    <script type="module">
      const data = [
        { id: '1', firstName: 'Alice', lastName: 'Johnson', email: 'alice.johnson@example.com', age: 34, active: true, priority: 'High' },
        { id: '2', firstName: 'Bob', lastName: 'Smith', email: 'bob.smith@example.com', age: 28, active: true, priority: 'Standard' },
        { id: '3', firstName: 'Carol', lastName: 'Williams', email: 'carol.williams@example.com', age: 45, active: false, priority: 'Low' },

        { id: '5', firstName: 'Eva', lastName: 'Davis', email: 'eva.davis@example.com', age: 27, active: true, priority: 'Standard' },
        { id: '6', firstName: 'Frank', lastName: 'Miller', email: 'frank.miller@example.com', age: 52, active: false, priority: 'Low' },
        { id: '7', firstName: 'Grace', lastName: 'Wilson', email: 'grace.wilson@example.com', age: 39, active: true, priority: 'High' },
        { id: '8', firstName: 'Henry', lastName: 'Moore', email: 'henry.moore@example.com', age: 41, active: true, priority: 'Standard' },
        { id: '9', firstName: 'Irene', lastName: 'Taylor', email: 'irene.taylor@example.com', age: 36, active: false, priority: 'High' },
        { id: '10', firstName: 'Jack', lastName: 'Anderson', email: 'jack.anderson@example.com', age: 29, active: true, priority: 'Low' },
        { id: '11', firstName: 'Karen', lastName: 'Thomas', email: 'karen.thomas@example.com', age: 33, active: true, priority: 'Standard' },
        { id: '12', firstName: 'Leo', lastName: 'Jackson', email: 'leo.jackson@example.com', age: 47, active: false, priority: 'High' },
        { id: '13', firstName: 'Mia', lastName: 'White', email: 'mia.white@example.com', age: 25, active: true, priority: 'Standard' },
        { id: '14', firstName: 'Nathan', lastName: 'Harris', email: 'nathan.harris@example.com', age: 38, active: true, priority: 'Low' },
        { id: '15', firstName: 'Olivia', lastName: 'Martin', email: 'olivia.martin@example.com', age: 30, active: false, priority: 'High' },
        { id: '16', firstName: 'Paul', lastName: 'Garcia', email: 'paul.garcia@example.com', age: 44, active: true, priority: 'Standard' },
        { id: '17', firstName: 'Quinn', lastName: 'Martinez', email: 'quinn.martinez@example.com', age: 26, active: true, priority: 'Low' },
        { id: '18', firstName: 'Rachel', lastName: 'Robinson', email: 'rachel.robinson@example.com', age: 35, active: true, priority: 'High' },
        { id: '19', firstName: 'Sam', lastName: 'Clark', email: 'sam.clark@example.com', age: 50, active: false, priority: 'Standard' },
        { id: '20', firstName: 'Tina', lastName: 'Lewis', email: 'tina.lewis@example.com', age: 32, active: true, priority: 'Low' },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'firstName', headerText: 'First Name', sort: true, filter: true, resizable: true },
        { key: 'lastName', headerText: 'Last Name', sort: true, filter: true, resizable: true },
        { key: 'email', headerText: 'Email Address' },
        { key: 'age', headerText: 'Age', type: 'number', sort: true, filter: true },
        { key: 'priority', headerText: 'Priority', sort: true },
        { key: 'active', headerText: 'Active', type: 'boolean' },
      ];
      grid.data = data;
    </script>
  </body>
</html>
