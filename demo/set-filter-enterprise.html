<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Filter (Enterprise) - ApexGrid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid-enterprise.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .badge {
        font-size: 13px;
        font-weight: 500;
        color: #92400e;
        background: #fef3c7;
        border: 1px solid #fde68a;
        border-radius: 20px;
        padding: 2px 10px;
        vertical-align: middle;
      }
      .filter-bar {
        position: relative;
        margin-bottom: 12px;
      }
      .filter-bar button {
        padding: 6px 12px;
        font: inherit;
        font-size: 13px;
        border: 1px solid #d0d5dd;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      .filter-bar button:hover {
        background: #f7f9fc;
      }
      apex-grid-set-filter {
        position: absolute;
        inset-block-start: 38px;
        inset-inline-start: 0;
        z-index: 20;
      }
      code {
        background: #f1f1f1;
        padding: 0 0.25rem;
        border-radius: 3px;
      }
      apex-grid-enterprise {
        min-height: 380px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid-enterprise');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Set Filter <span class="badge">Enterprise</span></h2>
    <p class="subtitle">
      An Excel-style checklist of a column's distinct values. Mount <code>&lt;apex-grid-set-filter&gt;</code>, set its <code>grid</code> + <code>column</code>, and unchecking a value hides its rows. It builds a value-membership condition on the grid's public <code>filter()</code> API — so it composes with the grid's other filters.
    </p>
    <div class="filter-bar">
      <button id="toggle">Department ▾</button>
      <apex-grid-set-filter id="filter" column="department"></apex-grid-set-filter>
    </div>
    <apex-grid-enterprise id="grid"></apex-grid-enterprise>
    <script type="module">
      const data = [
        { id: 1, name: 'Ava Morgan', department: 'Engineering', region: 'EMEA', salary: 96000 },
        { id: 2, name: 'Liam Chen', department: 'Engineering', region: 'AMER', salary: 104000 },
        { id: 3, name: 'Noah Patel', department: 'Engineering', region: 'EMEA', salary: 88000 },
        { id: 4, name: 'Emma Davis', department: 'Sales', region: 'AMER', salary: 72000 },
        { id: 5, name: 'Olivia Rossi', department: 'Sales', region: 'EMEA', salary: 69000 },
        { id: 6, name: 'William Kim', department: 'Sales', region: 'AMER', salary: 81000 },
        { id: 7, name: 'Sophia Nguyen', department: 'Marketing', region: 'EMEA', salary: 64000 },
        { id: 8, name: 'James Muller', department: 'Marketing', region: 'AMER', salary: 71000 },
        { id: 9, name: 'Isabella Costa', department: 'Support', region: 'AMER', salary: 58000 },
        { id: 10, name: 'Mateo Silva', department: 'Support', region: 'EMEA', salary: 61000 },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'name', headerText: 'Name' },
        { key: 'department', headerText: 'Department' },
        { key: 'region', headerText: 'Region' },
        { key: 'salary', headerText: 'Salary', type: 'number' },
      ];
      grid.data = data;

      const filter = document.getElementById('filter');
      filter.grid = grid;

      // Toggle the popover from the column button.
      const toggle = document.getElementById('toggle');
      toggle.addEventListener('click', () => {
        filter.style.display = filter.style.display === 'none' ? 'block' : 'none';
      });

      // Pre-filter (uncheck Sales) so the demo shows the checklist driving the grid.
      await filter.updateComplete;
      filter.setSelectedTokens(['Engineering', 'Marketing', 'Support']);
    </script>
  </body>
</html>
