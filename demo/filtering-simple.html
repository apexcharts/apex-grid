<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filtering - Basic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      apex-grid {
        min-height: 400px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      // Auto-apply Bootstrap Light theme
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic, grid works without it */ }
    </script>
  </head>
  <body>
    <h2>Basic Filtering</h2>
    <p class="subtitle">
      Click the filter icon in column headers to open the filter UI. Supports text, number, and boolean column types.
    </p>
    <apex-grid id="grid"></apex-grid>
    <script type="module">
      const data = [
        { id: '1', firstName: 'Alice', lastName: 'Johnson', age: 34, active: true },
        { id: '2', firstName: 'Bob', lastName: 'Smith', age: 28, active: true },
        { id: '3', firstName: 'Carol', lastName: 'Williams', age: 45, active: false },
        { id: '4', firstName: 'David', lastName: 'Brown', age: 31, active: true },
        { id: '5', firstName: 'Eva', lastName: 'Davis', age: 27, active: true },
        { id: '6', firstName: 'Frank', lastName: 'Miller', age: 52, active: false },
        { id: '7', firstName: 'Grace', lastName: 'Wilson', age: 39, active: true },
        { id: '8', firstName: 'Henry', lastName: 'Moore', age: 41, active: true },
        { id: '9', firstName: 'Irene', lastName: 'Taylor', age: 36, active: false },
        { id: '10', firstName: 'Jack', lastName: 'Anderson', age: 29, active: true },
        { id: '11', firstName: 'Karen', lastName: 'Thomas', age: 33, active: true },
        { id: '12', firstName: 'Leo', lastName: 'Jackson', age: 47, active: false },
        { id: '13', firstName: 'Mia', lastName: 'White', age: 25, active: true },
        { id: '14', firstName: 'Nathan', lastName: 'Harris', age: 38, active: true },
        { id: '15', firstName: 'Olivia', lastName: 'Martin', age: 30, active: false },
        { id: '16', firstName: 'Paul', lastName: 'Garcia', age: 44, active: true },
        { id: '17', firstName: 'Quinn', lastName: 'Martinez', age: 26, active: true },
        { id: '18', firstName: 'Rachel', lastName: 'Robinson', age: 35, active: true },
        { id: '19', firstName: 'Sam', lastName: 'Clark', age: 50, active: false },
        { id: '20', firstName: 'Tina', lastName: 'Lewis', age: 32, active: true },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'firstName', headerText: 'First Name', filter: true },
        { key: 'lastName', headerText: 'Last Name', filter: true },
        { key: 'age', headerText: 'Age', filter: true, type: 'number' },
        { key: 'active', headerText: 'Active', type: 'boolean', filter: true },
      ];
      grid.data = data;
    </script>
  </body>
</html>
