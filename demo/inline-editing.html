<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inline Editing (Cell Mode) - Project Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .log {
        margin-top: 12px;
        padding: 10px 14px;
        background: #f7f9fc;
        border-left: 3px solid #4f6ee0;
        font-size: 12px;
        font-family: 'Inter', sans-serif;
        color: #1a1a2e;
        max-height: 120px;
        overflow-y: auto;
      }
      .log-entry {
        line-height: 1.6;
      }
      .log-entry.rejected {
        color: #b71c1c;
      }
      apex-grid {
        min-height: 420px;
        --ig-size: 2;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }
      .pill.todo        { background: #f1f5f9; color: #475569; }
      .pill.in_progress { background: #fef3c7; color: #92400e; }
      .pill.review      { background: #ddd6fe; color: #5b21b6; }
      .pill.done        { background: #dcfce7; color: #166534; }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Inline Editing — Project Tasks</h2>
    <p class="subtitle">
      Double-click any editable cell to edit. The "% Complete" column rejects values above 100 via <code>cellValueChanging.preventDefault()</code>; rejections appear in red in the log below.
    </p>
    <apex-grid id="grid"></apex-grid>
    <div class="log" id="log"></div>
    <script type="module">
      import { html } from 'https://cdn.jsdelivr.net/npm/lit@3/+esm';

      const STATUSES = ['todo', 'in_progress', 'review', 'done'];
      const STATUS_LABEL = { todo: 'To Do', in_progress: 'In Progress', review: 'Review', done: 'Done' };
      const STATUS_STYLE = {
        todo:        'background:#f1f5f9;color:#475569',
        in_progress: 'background:#fef3c7;color:#92400e',
        review:      'background:#ddd6fe;color:#5b21b6',
        done:        'background:#dcfce7;color:#166534',
      };
      const pillStyle = (v) => `display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;${STATUS_STYLE[v] || ''}`;

      const data = [
        { id: '1', task: 'Design new onboarding flow',         owner: 'Mira Patel',    status: 'in_progress', due: '2026-06-04', percent: 65 },
        { id: '2', task: 'Migrate auth to OIDC',               owner: 'Diego Rojas',   status: 'review',      due: '2026-05-29', percent: 90 },
        { id: '3', task: 'Add CSV export to dashboard',        owner: 'Priya Iyer',    status: 'done',        due: '2026-05-22', percent: 100 },
        { id: '4', task: 'Refactor pricing module',            owner: 'Otis Brown',    status: 'todo',        due: '2026-06-12', percent: 0  },
        { id: '5', task: 'Localize marketing site',            owner: 'Ana Costa',     status: 'in_progress', due: '2026-06-18', percent: 35 },
        { id: '6', task: 'Set up Playwright CI runners',       owner: 'Sven Eriksen',  status: 'in_progress', due: '2026-06-02', percent: 55 },
        { id: '7', task: 'Audit accessibility on settings',    owner: 'Yuki Tanaka',   status: 'review',      due: '2026-05-30', percent: 80 },
        { id: '8',  task: 'Write postmortem for incident-417',  owner: 'Kofi Mensah',   status: 'todo',        due: '2026-05-28', percent: 0  },
        { id: '9',  task: 'Implement dark mode toggle',          owner: 'Lena Fischer',  status: 'in_progress', due: '2026-06-20', percent: 45 },
        { id: '10', task: 'Add rate limiting to public API',     owner: 'Rajan Mehta',   status: 'todo',        due: '2026-06-25', percent: 0  },
        { id: '11', task: 'Fix broken pagination on reports',    owner: 'Clara Santos',  status: 'done',        due: '2026-05-26', percent: 100 },
        { id: '12', task: 'Upgrade Node.js to v22 LTS',          owner: 'Ethan Park',    status: 'review',      due: '2026-06-08', percent: 85 },
        { id: '13', task: 'Replace legacy REST with GraphQL',    owner: 'Amara Diallo',  status: 'in_progress', due: '2026-07-10', percent: 25 },
        { id: '14', task: 'Build audit log viewer',              owner: 'Mira Patel',    status: 'todo',        due: '2026-07-18', percent: 0  },
        { id: '15', task: 'Harden CORS policy across services',  owner: 'Diego Rojas',   status: 'review',      due: '2026-06-05', percent: 75 },
        { id: '16', task: 'Migrate S3 buckets to new region',    owner: 'Sven Eriksen',  status: 'done',        due: '2026-05-31', percent: 100 },
        { id: '17', task: 'Add webhook signature verification',  owner: 'Priya Iyer',    status: 'in_progress', due: '2026-06-14', percent: 50 },
        { id: '18', task: 'Optimise slow search query',          owner: 'Yuki Tanaka',   status: 'todo',        due: '2026-06-22', percent: 0  },
        { id: '19', task: 'Document public REST API endpoints',  owner: 'Kofi Mensah',   status: 'in_progress', due: '2026-06-30', percent: 30 },
        { id: '20', task: 'Implement feature flag service',      owner: 'Ana Costa',     status: 'todo',        due: '2026-07-05', percent: 0  },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'task',  headerText: 'Task',  editable: true },
        { key: 'owner', headerText: 'Owner', editable: true },
        {
          key: 'status', headerText: 'Status', editable: true,
          cellTemplate: ({ value }) =>
            html`<span style="${pillStyle(value)}">${STATUS_LABEL[value] ?? value}</span>`,
        },
        { key: 'due',     headerText: 'Due',         editable: true },
        { key: 'percent', headerText: '% Complete',  editable: true, type: 'number' },
      ];
      grid.data = data;
      grid.editing = { enabled: true, mode: 'cell', trigger: 'doubleClick' };

      const log = document.getElementById('log');
      const append = (msg, rejected = false) => {
        const entry = document.createElement('div');
        entry.className = 'log-entry' + (rejected ? ' rejected' : '');
        entry.textContent = msg;
        log.prepend(entry);
      };

      grid.addEventListener('cellValueChanging', (e) => {
        const { key, oldValue, newValue } = e.detail;
        if (key === 'percent' && (Number(newValue) < 0 || Number(newValue) > 100)) {
          e.preventDefault();
          append(`rejected: ${key} must be 0–100 (${oldValue} → ${newValue})`, true);
        }
      });
      grid.addEventListener('cellValueChanged', (e) => {
        const { key, oldValue, newValue } = e.detail;
        append(`${key}: ${oldValue} → ${newValue}`);
      });
    </script>
  </body>
</html>
