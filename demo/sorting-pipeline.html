<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorting - Data Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      apex-grid {
        min-height: 400px;
        --ig-size: 2;
      }
      .request-box {
        margin-bottom: 12px;
      }
      .request-box h4 {
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        margin: 0 0 6px 0;
      }
      .request-box code {
        display: block;
        padding: 10px 14px;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 12px;
        color: #334155;
        min-height: 18px;
        font-family: 'SF Mono', 'Fira Code', monospace;
      }
      .grid-wrapper {
        position: relative;
      }
      .loading-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.7);
        z-index: 2;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #64748b;
      }
      .loading-overlay.active {
        display: flex;
      }
    </style>
    <script type="module">
      // Auto-apply Bootstrap Light theme
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic, grid works without it */ }
    </script>
  </head>
  <body>
    <h2>Sorting - Data Pipeline</h2>
    <p class="subtitle">
      Sort columns to see the generated API request URI. Uses a custom data pipeline with a simulated async delay.
    </p>
    <div class="request-box">
      <h4>Generated request</h4>
      <code id="qs"></code>
    </div>
    <div class="grid-wrapper">
      <div class="loading-overlay" id="loader">Sorting...</div>
      <apex-grid id="grid"></apex-grid>
    </div>
    <script type="module">
      const data = [
        { id: '1', name: 'Wireless Headphones', price: 129.99, sold: 82, rating: 4.5, total: 10659.18 },
        { id: '2', name: 'USB-C Hub', price: 49.99, sold: 35, rating: 3.8, total: 1749.65 },
        { id: '3', name: 'Mechanical Keyboard', price: 189.00, sold: 64, rating: 4.7, total: 12096.00 },
        { id: '4', name: 'Ergonomic Mouse', price: 79.95, sold: 91, rating: 4.2, total: 7275.45 },
        { id: '5', name: 'Monitor Stand', price: 59.99, sold: 47, rating: 3.5, total: 2819.53 },
        { id: '6', name: '4K Webcam', price: 149.00, sold: 28, rating: 4.0, total: 4172.00 },
        { id: '7', name: 'Laptop Sleeve', price: 34.99, sold: 110, rating: 4.3, total: 3848.90 },
        { id: '8', name: 'Desk Lamp', price: 44.50, sold: 73, rating: 3.9, total: 3248.50 },
        { id: '9', name: 'Cable Organizer', price: 19.99, sold: 156, rating: 4.1, total: 3118.44 },
        { id: '10', name: 'Bluetooth Speaker', price: 89.99, sold: 58, rating: 4.6, total: 5219.42 },
        { id: '11', name: 'Screen Protector', price: 14.99, sold: 203, rating: 3.2, total: 3042.97 },
        { id: '12', name: 'Power Bank', price: 39.99, sold: 88, rating: 4.4, total: 3519.12 },
        { id: '13', name: 'USB Flash Drive', price: 24.99, sold: 134, rating: 3.7, total: 3348.66 },
        { id: '14', name: 'Wireless Charger', price: 29.99, sold: 97, rating: 4.0, total: 2909.03 },
        { id: '15', name: 'Noise Cancelling Earbuds', price: 199.99, sold: 42, rating: 4.8, total: 8399.58 },
        { id: '16', name: 'Docking Station', price: 249.99, sold: 19, rating: 4.1, total: 4749.81 },
        { id: '17', name: 'Webcam Cover', price: 9.99, sold: 312, rating: 3.6, total: 3116.88 },
        { id: '18', name: 'Portable SSD', price: 119.99, sold: 53, rating: 4.6, total: 6359.47 },
        { id: '19', name: 'HDMI Cable', price: 12.99, sold: 278, rating: 4.0, total: 3611.22 },
        { id: '20', name: 'Tablet Stand', price: 32.99, sold: 67, rating: 3.9, total: 2210.33 },
      ];

      const qsEl = document.getElementById('qs');
      const loader = document.getElementById('loader');

      function buildUri(expressions) {
        const parts = [];
        for (const expr of expressions) {
          if (expr.direction === 'none') continue;
          parts.push(expr.direction === 'ascending' ? `asc(${expr.key})` : `desc(${expr.key})`);
        }
        return `GET: /data?sort_by=${parts.join(',')}`;
      }

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'name', headerText: 'Name', sort: true },
        { key: 'price', type: 'number', headerText: 'Price', sort: true },
        { key: 'rating', type: 'number', headerText: 'Rating', sort: true },
        { key: 'sold', type: 'number', headerText: 'Sold', sort: true },
        { key: 'total', type: 'number', headerText: 'Total', sort: true },
      ];
      grid.dataPipelineConfiguration = {
        sort: async ({ data, grid: g }) => {
          loader.classList.add('active');
          qsEl.textContent = g.sortExpressions.length ? buildUri(g.sortExpressions) : '';
          await new Promise(r => setTimeout(r, 250));
          loader.classList.remove('active');
          return data;
        },
      };
      grid.data = data;
    </script>
  </body>
</html>
