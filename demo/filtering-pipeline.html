<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filtering - Data Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      apex-grid {
        min-height: 400px;
        --ig-size: 2;
      }
      .request-box {
        margin-bottom: 12px;
      }
      .request-box h4 {
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        margin: 0 0 6px 0;
      }
      .request-box code {
        display: block;
        padding: 10px 14px;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 12px;
        color: #334155;
        min-height: 18px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        word-break: break-all;
      }
      .grid-wrapper {
        position: relative;
      }
      .loading-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.7);
        z-index: 2;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #64748b;
      }
      .loading-overlay.active {
        display: flex;
      }
    </style>
    <script type="module">
      // Auto-apply Bootstrap Light theme
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic, grid works without it */ }
    </script>
  </head>
  <body>
    <h2>Filtering - Data Pipeline</h2>
    <p class="subtitle">
      Apply filters to see the generated API request URI. Uses a custom data pipeline with a simulated async delay.
    </p>
    <div class="request-box">
      <h4>Generated request</h4>
      <code id="qs"></code>
    </div>
    <div class="grid-wrapper">
      <div class="loading-overlay" id="loader">Filtering...</div>
      <apex-grid id="grid"></apex-grid>
    </div>
    <script type="module">
      const data = [
        { id: '1', firstName: 'Alice', lastName: 'Johnson', age: 34, active: true },
        { id: '2', firstName: 'Bob', lastName: 'Smith', age: 28, active: true },
        { id: '3', firstName: 'Carol', lastName: 'Williams', age: 45, active: false },
        { id: '4', firstName: 'David', lastName: 'Brown', age: 31, active: true },
        { id: '5', firstName: 'Eva', lastName: 'Davis', age: 27, active: true },
        { id: '6', firstName: 'Frank', lastName: 'Miller', age: 52, active: false },
        { id: '7', firstName: 'Grace', lastName: 'Wilson', age: 39, active: true },
        { id: '8', firstName: 'Henry', lastName: 'Moore', age: 41, active: true },
        { id: '9', firstName: 'Irene', lastName: 'Taylor', age: 36, active: false },
        { id: '10', firstName: 'Jack', lastName: 'Anderson', age: 29, active: true },
        { id: '11', firstName: 'Karen', lastName: 'Thomas', age: 33, active: true },
        { id: '12', firstName: 'Leo', lastName: 'Jackson', age: 47, active: false },
        { id: '13', firstName: 'Mia', lastName: 'White', age: 25, active: true },
        { id: '14', firstName: 'Nathan', lastName: 'Harris', age: 38, active: true },
        { id: '15', firstName: 'Olivia', lastName: 'Martin', age: 30, active: false },
        { id: '16', firstName: 'Paul', lastName: 'Garcia', age: 44, active: true },
        { id: '17', firstName: 'Quinn', lastName: 'Martinez', age: 26, active: true },
        { id: '18', firstName: 'Rachel', lastName: 'Robinson', age: 35, active: true },
        { id: '19', firstName: 'Sam', lastName: 'Clark', age: 50, active: false },
        { id: '20', firstName: 'Tina', lastName: 'Lewis', age: 32, active: true },
      ];

      const qsEl = document.getElementById('qs');
      const loader = document.getElementById('loader');

      function groupBy(arr, key) {
        const out = {};
        for (const each of arr) {
          const slot = each[key];
          if (!out[slot]) out[slot] = [];
          out[slot].push(each);
        }
        return out;
      }

      function mapExpressions(arr) {
        return arr.map((expr, idx) => {
          const cName = expr.condition?.name ?? 'unknown';
          return idx < 1
            ? `${cName}("${expr.searchTerm}")`
            : `${(expr.criteria || 'and').toUpperCase()} ${cName}("${expr.searchTerm}")`;
        }).join(' ');
      }

      function buildUri(expressions) {
        const out = [];
        const grouped = groupBy(expressions, 'key');
        for (const [key, exprs] of Object.entries(grouped)) {
          out.push(`${key}(${mapExpressions(exprs)})`);
        }
        return `GET: /data?filter=${out.join('&')}`;
      }

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'firstName', headerText: 'First Name', filter: true },
        { key: 'lastName', headerText: 'Last Name', filter: true },
        { key: 'age', headerText: 'Age', filter: true, type: 'number' },
        { key: 'active', headerText: 'Active', type: 'boolean', filter: true },
      ];
      grid.dataPipelineConfiguration = {
        filter: async ({ data, grid: g }) => {
          loader.classList.add('active');
          if (g.filterExpressions.length) {
            qsEl.textContent = buildUri(g.filterExpressions);
          } else {
            qsEl.textContent = '';
          }
          await new Promise(r => setTimeout(r, 250));
          loader.classList.remove('active');
          return data;
        },
      };
      grid.data = data;
    </script>
  </body>
</html>
