<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagination (Local) - ApexGrid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      apex-grid {
        min-height: 480px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Pagination (Local Slicing)</h2>
    <p class="subtitle">
      120 rows sliced locally. Page size selector and navigation buttons are rendered by <code>&lt;apex-grid-paginator&gt;</code>.
    </p>
    <apex-grid id="grid"></apex-grid>
    <script type="module">
      const seed = ['Wireless Headphones','USB-C Hub','Mechanical Keyboard','Ergonomic Mouse','Monitor Stand','4K Webcam','Laptop Sleeve','Desk Lamp','Cable Organizer','Bluetooth Speaker','Screen Protector','Power Bank','USB Flash Drive','Wireless Charger','Noise Cancelling Earbuds','Docking Station','Webcam Cover','Portable SSD','HDMI Cable','Tablet Stand'];
      const data = [];
      for (let i = 1; i <= 120; i++) {
        const name = seed[(i - 1) % seed.length];
        data.push({
          id: String(i).padStart(4, '0'),
          name,
          price: Math.round((20 + Math.random() * 230) * 100) / 100,
          sold:  Math.floor(20 + Math.random() * 280),
          rating: Math.round((3 + Math.random() * 2) * 10) / 10,
        });
      }

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'id',     headerText: 'ID'     },
        { key: 'name',   headerText: 'Product' },
        { key: 'price',  headerText: 'Price',  type: 'number' },
        { key: 'sold',   headerText: 'Sold',   type: 'number' },
        { key: 'rating', headerText: 'Rating', type: 'number' },
      ];
      grid.data = data;
      grid.pagination = {
        enabled: true,
        pageSize: 15,
        pageSizeOptions: [10, 15, 25, 50],
      };
    </script>
  </body>
</html>
