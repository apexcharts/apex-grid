<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cell Template - Music Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      apex-grid {
        min-height: 400px;
        --ig-size: 2;
      }
      .cover {
        width: 28px;
        height: 28px;
        border-radius: 4px;
        display: inline-block;
        vertical-align: middle;
        background-size: cover;
        background-position: center;
        box-shadow: 0 1px 2px rgba(0,0,0,0.15);
      }
      .rating {
        color: #f59e0b;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .duration {
        font-variant-numeric: tabular-nums;
        color: #475569;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic, grid works without it */ }
    </script>
  </head>
  <body>
    <h2>Music Library</h2>
    <p class="subtitle">
      Custom cell templates render album cover gradients, formatted durations, and star ratings
    </p>
    <apex-grid id="grid"></apex-grid>
    <script type="module">
      import { html } from 'https://cdn.jsdelivr.net/npm/lit@3/+esm';

      const fmtDuration = (sec) => `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;

      const stars = (rating) => {
        const full = Math.floor(rating);
        const half = rating - full >= 0.5 ? '½' : '';
        return '★'.repeat(full) + half + '☆'.repeat(5 - full - (half ? 1 : 0));
      };

      const grad = (g1, g2) => `linear-gradient(135deg, ${g1}, ${g2})`;

      const data = [
        { id: '1',  track: 'Midnight City',       artist: 'M83',                duration: 244, rating: 4.7, cover: grad('#0ea5e9', '#1e3a8a') },
        { id: '2',  track: 'Time',                artist: 'Hans Zimmer',        duration: 271, rating: 4.9, cover: grad('#0f172a', '#475569') },
        { id: '3',  track: 'Resonance',           artist: 'Home',               duration: 213, rating: 4.5, cover: grad('#a855f7', '#ec4899') },
        { id: '4',  track: 'Pumped Up Kicks',     artist: 'Foster the People',  duration: 240, rating: 4.2, cover: grad('#f59e0b', '#ef4444') },
        { id: '5',  track: 'Bohemian Rhapsody',   artist: 'Queen',              duration: 354, rating: 4.9, cover: grad('#7c3aed', '#1e1b4b') },
        { id: '6',  track: 'Take On Me',          artist: 'a-ha',               duration: 226, rating: 4.6, cover: grad('#06b6d4', '#0c4a6e') },
        { id: '7',  track: 'Africa',              artist: 'Toto',               duration: 295, rating: 4.4, cover: grad('#84cc16', '#16a34a') },
        { id: '8',  track: 'Lose Yourself',       artist: 'Eminem',             duration: 326, rating: 4.7, cover: grad('#dc2626', '#7f1d1d') },
        { id: '9',  track: 'Smells Like Teen Spirit', artist: 'Nirvana',        duration: 301, rating: 4.5, cover: grad('#facc15', '#a16207') },
        { id: '10', track: 'Clocks',              artist: 'Coldplay',           duration: 308, rating: 4.3, cover: grad('#22d3ee', '#1e40af') },
        { id: '11', track: 'Sweet Child O\' Mine',artist: 'Guns N\' Roses',     duration: 356, rating: 4.6, cover: grad('#f97316', '#7c2d12') },
        { id: '12', track: 'Karma Police',        artist: 'Radiohead',          duration: 261, rating: 4.5, cover: grad('#475569', '#1e293b') },
        { id: '13', track: 'Hotel California',    artist: 'Eagles',             duration: 391, rating: 4.8, cover: grad('#a16207', '#451a03') },
        { id: '14', track: 'Wonderwall',          artist: 'Oasis',              duration: 258, rating: 4.1, cover: grad('#65a30d', '#365314') },
        { id: '15', track: 'Hallelujah',          artist: 'Jeff Buckley',       duration: 414, rating: 4.9, cover: grad('#9333ea', '#312e81') },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        {
          key: 'cover', headerText: '',
          cellTemplate: ({ value }) =>
            html`<span style="display:inline-block;width:28px;height:28px;border-radius:4px;background:${value};box-shadow:0 1px 2px rgba(0,0,0,0.15);vertical-align:middle"></span>`,
        },
        { key: 'track',  headerText: 'Track'    },
        { key: 'artist', headerText: 'Artist'   },
        {
          key: 'duration', headerText: 'Duration', type: 'number',
          cellTemplate: ({ value }) =>
            html`<span style="font-variant-numeric:tabular-nums;color:#475569">${fmtDuration(value)}</span>`,
        },
        {
          key: 'rating', headerText: 'Rating', type: 'number',
          cellTemplate: ({ value }) =>
            html`<span style="color:#f59e0b;font-weight:600;letter-spacing:0.5px">${stars(value)} ${value.toFixed(1)}</span>`,
        },
      ];
      grid.data = data;
    </script>
  </body>
</html>
