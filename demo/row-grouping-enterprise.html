<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Row Grouping (Enterprise) - ApexGrid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid-enterprise.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .badge {
        font-size: 13px;
        font-weight: 500;
        color: #92400e;
        background: #fef3c7;
        border: 1px solid #fde68a;
        border-radius: 20px;
        padding: 2px 10px;
        vertical-align: middle;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .toolbar button {
        padding: 6px 12px;
        font: inherit;
        font-size: 13px;
        border: 1px solid #d0d5dd;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #f7f9fc;
      }
      code {
        background: #f1f1f1;
        padding: 0 0.25rem;
        border-radius: 3px;
      }
      apex-grid-enterprise {
        min-height: 460px;
        --ig-size: 2;
      }
    </style>
    <script type="module">
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/igniteui-webcomponents@5/themes/light/bootstrap.css');
        const css = await resp.text();
        const style = document.createElement('style');
        style.textContent = css.replaceAll(':root', 'apex-grid-enterprise');
        document.head.appendChild(style);
      } catch (e) { /* theme is cosmetic */ }
    </script>
  </head>
  <body>
    <h2>Row Grouping <span class="badge">Enterprise</span></h2>
    <p class="subtitle">
      Group rows by one or more columns with the <code>groupBy</code> property. Each group renders an expandable header row with its leaf count and per-group aggregates (configured via <code>aggregations</code>).
    </p>
    <div class="toolbar">
      <button id="by-dept">Group by department</button>
      <button id="by-region-dept">Group by region → department</button>
      <button id="ungroup">Ungroup</button>
      <button id="expand">Expand all</button>
      <button id="collapse">Collapse all</button>
    </div>
    <apex-grid-enterprise id="grid"></apex-grid-enterprise>
    <script type="module">
      const data = [
        { id: 1, name: 'Ava Morgan', department: 'Engineering', region: 'EMEA', salary: 96000, age: 34 },
        { id: 2, name: 'Liam Chen', department: 'Engineering', region: 'AMER', salary: 104000, age: 41 },
        { id: 3, name: 'Noah Patel', department: 'Engineering', region: 'EMEA', salary: 88000, age: 29 },
        { id: 4, name: 'Emma Davis', department: 'Sales', region: 'AMER', salary: 72000, age: 38 },
        { id: 5, name: 'Olivia Rossi', department: 'Sales', region: 'EMEA', salary: 69000, age: 45 },
        { id: 6, name: 'William Kim', department: 'Sales', region: 'AMER', salary: 81000, age: 33 },
        { id: 7, name: 'Sophia Nguyen', department: 'Marketing', region: 'EMEA', salary: 64000, age: 27 },
        { id: 8, name: 'James Muller', department: 'Marketing', region: 'AMER', salary: 71000, age: 36 },
        { id: 9, name: 'Isabella Costa', department: 'Engineering', region: 'AMER', salary: 99000, age: 31 },
        { id: 10, name: 'Mateo Silva', department: 'Sales', region: 'EMEA', salary: 75000, age: 42 },
        { id: 11, name: 'Mia Johnson', department: 'Marketing', region: 'AMER', salary: 68000, age: 30 },
        { id: 12, name: 'Lucas Brown', department: 'Engineering', region: 'EMEA', salary: 91000, age: 39 },
      ];

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'name', headerText: 'Name' },
        { key: 'department', headerText: 'Department' },
        { key: 'region', headerText: 'Region' },
        { key: 'salary', headerText: 'Salary', type: 'number' },
        { key: 'age', headerText: 'Age', type: 'number' },
      ];
      grid.data = data;

      // Aggregates shown on each group header, computed over its leaf rows.
      grid.aggregations = { salary: ['sum', 'avg'], age: ['avg'] };
      // Start grouped by department, expanded so the aggregates are visible.
      grid.groupBy = ['department'];

      document.getElementById('by-dept').onclick = () => { grid.groupBy = ['department']; };
      document.getElementById('by-region-dept').onclick = () => { grid.groupBy = ['region', 'department']; };
      document.getElementById('ungroup').onclick = () => { grid.groupBy = []; };
      document.getElementById('expand').onclick = () => grid.expandAllGroups();
      document.getElementById('collapse').onclick = () => grid.collapseAllGroups();
    </script>
  </body>
</html>
