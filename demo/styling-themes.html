<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styling - Themes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apex-grid.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        color: #1a1a2e;
        padding: 20px;
        transition: background 0.3s, color 0.3s;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.92em;
      }
      apex-grid {
        min-height: 400px;
        --ig-size: 2;
      }
      .panel {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
        align-items: center;
      }
      .panel label {
        font-size: 13px;
        color: #475569;
        font-weight: 500;
      }
      .panel select {
        padding: 6px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
      }

      /* Page chrome follows the selected variant. */
      body.dark {
        background: #0f172a;
        color: #e2e8f0;
      }
      body.dark h2 {
        color: #f1f5f9;
      }
      body.dark .panel label {
        color: #94a3b8;
      }
      body.dark .panel select {
        background: #1e293b;
        color: #e2e8f0;
        border-color: #334155;
      }
    </style>
  </head>
  <body>
    <h2>Theme Presets: Watchlist</h2>
    <p class="subtitle">
      Four brand presets, each in light and dark. Each preset sets only <code>--ag-brand</code>; the
      <code>theme="tinted"</code> flag mixes that brand into the chrome (header, zebra rows, gridlines) so
      every preset reads distinctly at rest. Dark variants use <code>theme="dark tinted"</code>. No external CSS.
    </p>
    <div class="panel">
      <label for="themeSelect">Select a theme:</label>
      <select id="themeSelect">
        <option value="blue-light" selected>Blue</option>
        <option value="blue-dark">Blue Dark</option>
        <option value="teal-light">Teal</option>
        <option value="teal-dark">Teal Dark</option>
        <option value="violet-light">Violet</option>
        <option value="violet-dark">Violet Dark</option>
        <option value="amber-light">Amber</option>
        <option value="amber-dark">Amber Dark</option>
      </select>
    </div>
    <apex-grid id="grid"></apex-grid>
    <script type="module">
      import { html } from 'https://cdn.jsdelivr.net/npm/lit@3/+esm';

      // Each preset is a brand accent (light/dark surfaces come from the
      // grid's default tokens / the built-in theme="dark"). Switching a preset
      // only overrides --ag-brand on the host, and the chrome re-skins from there.
      const themeMap = {
        'blue-light': { brand: '#2563eb', strong: '#1d4ed8', dark: false },
        'blue-dark': { brand: '#60a5fa', strong: '#93c5fd', dark: true },
        'teal-light': { brand: '#0d9488', strong: '#0f766e', dark: false },
        'teal-dark': { brand: '#2dd4bf', strong: '#5eead4', dark: true },
        'violet-light': { brand: '#7c3aed', strong: '#6d28d9', dark: false },
        'violet-dark': { brand: '#a78bfa', strong: '#c4b5fd', dark: true },
        'amber-light': { brand: '#d97706', strong: '#b45309', dark: false },
        'amber-dark': { brand: '#fbbf24', strong: '#fcd34d', dark: true },
      };

      const data = [
        { id: '1',  ticker: 'AAPL',  name: 'Apple Inc.',           price: 217.42, changePct:  1.34, marketCap: 3320 },
        { id: '2',  ticker: 'MSFT',  name: 'Microsoft Corp.',      price: 428.91, changePct:  0.72, marketCap: 3190 },
        { id: '3',  ticker: 'NVDA',  name: 'NVIDIA Corp.',         price: 124.85, changePct:  3.41, marketCap: 3070 },
        { id: '4',  ticker: 'GOOGL', name: 'Alphabet Inc.',        price: 182.36, changePct: -0.41, marketCap: 2270 },
        { id: '5',  ticker: 'AMZN',  name: 'Amazon.com Inc.',      price: 186.55, changePct:  0.88, marketCap: 1950 },
        { id: '6',  ticker: 'META',  name: 'Meta Platforms',       price: 503.28, changePct: -1.12, marketCap: 1280 },
        { id: '7',  ticker: 'TSLA',  name: 'Tesla Inc.',           price: 218.04, changePct:  2.65, marketCap:  697 },
        { id: '8',  ticker: 'BRK.B', name: 'Berkshire Hathaway',   price: 446.71, changePct:  0.21, marketCap:  962 },
        { id: '9',  ticker: 'JPM',   name: 'JPMorgan Chase',       price: 206.32, changePct: -0.58, marketCap:  595 },
        { id: '10', ticker: 'V',     name: 'Visa Inc.',            price: 275.89, changePct:  0.34, marketCap:  543 },
        { id: '11', ticker: 'UNH',   name: 'UnitedHealth Group',   price: 506.13, changePct: -2.17, marketCap:  466 },
        { id: '12', ticker: 'XOM',   name: 'Exxon Mobil',          price: 114.27, changePct:  1.08, marketCap:  502 },
        { id: '13', ticker: 'AVGO',  name: 'Broadcom Inc.',        price: 167.41, changePct:  4.22, marketCap:  778 },
        { id: '14', ticker: 'COST',  name: 'Costco Wholesale',     price: 851.74, changePct: -0.34, marketCap:  378 },
        { id: '15', ticker: 'NFLX',  name: 'Netflix Inc.',         price: 671.55, changePct:  1.61, marketCap:  289 },
      ];

      const usd = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
      const fmtPrice = ({ value }) => usd.format(value);
      const fmtChange = ({ value }) => html`<span style="color:${value >= 0 ? '#16a34a' : '#dc2626'};font-weight:600">${value >= 0 ? '+' : ''}${value.toFixed(2)}%</span>`;
      const fmtCap = ({ value }) => `$${value.toFixed(0)}B`;

      const grid = document.getElementById('grid');
      grid.columns = [
        { key: 'ticker',    headerText: 'Ticker',     sort: true, filter: true },
        { key: 'name',      headerText: 'Name',       sort: true, filter: true },
        { key: 'price',     headerText: 'Price',      sort: true, filter: true, type: 'number', cellTemplate: fmtPrice },
        { key: 'changePct', headerText: 'Change %',   sort: true, filter: true, type: 'number', cellTemplate: fmtChange },
        { key: 'marketCap', headerText: 'Market Cap', sort: true, filter: true, type: 'number', cellTemplate: fmtCap },
      ];
      grid.data = data;
      // Start sorted so the active-sort header carries the accent too.
      grid.sort({ key: 'changePct', direction: 'descending' });

      function applyTheme(themeKey) {
        const preset = themeMap[themeKey];
        if (!preset) return;

        // `tinted` mixes the brand into the chrome (header, zebra rows,
        // gridlines) so each preset reads distinctly even with nothing
        // selected; `dark` adds the built-in slate palette on top.
        grid.setAttribute('theme', preset.dark ? 'dark tinted' : 'tinted');

        grid.style.setProperty('--ag-brand', preset.brand);
        grid.style.setProperty('--ag-brand-strong', preset.strong);

        // Page chrome follows along.
        document.body.classList.toggle('dark', preset.dark);
      }

      document.getElementById('themeSelect').addEventListener('change', (e) => {
        applyTheme(e.target.value);
      });

      applyTheme('blue-light');
    </script>
  </body>
</html>
