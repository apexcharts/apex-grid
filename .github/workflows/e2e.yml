name: Visual E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Run inside the SAME Playwright image used to generate the committed Linux
    # baselines (e2e/__screenshots__/chromium-linux). Font rendering is identical
    # to that image, so screenshots match deterministically — running on the bare
    # ubuntu-latest runner instead would drift on antialiasing. Keep this tag in
    # lockstep with the @playwright/test version and the e2e:docker* scripts.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      # pree2e bundles BOTH demos, so it needs core AND enterprise dist/define.js
      # (demo:bundle + demo:bundle:enterprise). Build both, like the publish job.
      - run: npm run build
      # pree2e bundles the demo + vendors lit, then Playwright compares snapshots.
      - run: npm run e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
